---
- hosts: app
  become: yes
  gather_facts: yes

  vars:
    deploy_path: "{{ lookup('env', 'DEPLOY_PATH') | default('/opt/myapp', true) }}"
    docker_registry: "{{ lookup('env', 'DOCKER_REGISTRY') }}"
    pip_index_url: "{{ lookup('env', 'PIP_INDEX_URL') }}"

  roles:
    - role: deploy
      tags:
        - deploy
