---
- name: Créer le répertoire de déploiement
  ansible.builtin.file:
    path: "{{ deploy_path }}"
    state: directory
    mode: "0755"

- name: Copier les fichiers de l'application
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ deploy_path }}/{{ item.dest }}"
    mode: "0644"
  loop:
    - { src: "{{ playbook_dir }}/../Dockerfile", dest: "Dockerfile" }
    - { src: "{{ playbook_dir }}/../docker-compose.yml", dest: "docker-compose.yml" }

- name: Copier le répertoire app
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../app/"
    dest: "{{ deploy_path }}/app/"
    mode: "0644"

- name: Créer le fichier .env pour docker compose
  ansible.builtin.copy:
    content: |
      DOCKER_REGISTRY={{ docker_registry }}
      PIP_INDEX_URL={{ pip_index_url }}
    dest: "{{ deploy_path }}/.env"
    mode: "0600"

- name: Build et lancement du conteneur
  ansible.builtin.shell:
    cmd: docker compose up -d --build --force-recreate
    chdir: "{{ deploy_path }}"

- name: Vérifier que le conteneur est lancé
  ansible.builtin.shell:
    cmd: docker compose ps --format json
    chdir: "{{ deploy_path }}"
  register: compose_ps
  changed_when: false

- name: Afficher le statut du conteneur
  ansible.builtin.debug:
    msg: "{{ compose_ps.stdout }}"
