---
- name: Créer le répertoire de déploiement
  ansible.builtin.file:
    path: "{{ deploy_path }}"
    state: directory
    mode: "0755"

- name: Créer l'archive compressée du livrable
  delegate_to: localhost
  ansible.builtin.archive:
    path:
      - "{{ playbook_dir }}/../Dockerfile"
      - "{{ playbook_dir }}/../docker-compose.yml"
      - "{{ playbook_dir }}/../app"
    dest: /tmp/livrable.tar.gz
    format: gz

- name: Transférer et décompresser le livrable
  ansible.builtin.unarchive:
    src: /tmp/livrable.tar.gz
    dest: "{{ deploy_path }}/"

- name: Créer le fichier .env pour docker compose
  ansible.builtin.copy:
    content: |
      DOCKER_REGISTRY={{ docker_registry }}
      PIP_INDEX_URL={{ pip_index_url }}
    dest: "{{ deploy_path }}/.env"
    mode: "0600"

- name: Build et lancement du conteneur
  ansible.builtin.shell:
    cmd: docker compose up -d --build --force-recreate
    chdir: "{{ deploy_path }}"

- name: Vérifier que le conteneur est lancé
  ansible.builtin.shell:
    cmd: docker compose ps --format json
    chdir: "{{ deploy_path }}"
  register: compose_ps
  changed_when: false

- name: Afficher le statut du conteneur
  ansible.builtin.debug:
    msg: "{{ compose_ps.stdout }}"
