services:
  myapp:
    build:
      context: .
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY}
        PIP_INDEX_URL: ${PIP_INDEX_URL}
    container_name: myapp
    ports:
      - "1000:1000"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://myapp:myapp@db:5432/myapp
      - SECRET_KEY=changez-moi-en-production-avec-une-valeur-aleatoire

  db:
    image: ${DOCKER_REGISTRY:-docker.io}/postgres:16-alpine
    container_name: myapp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: myapp
      POSTGRES_PASSWORD: myapp
      POSTGRES_DB: myapp
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myapp"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
